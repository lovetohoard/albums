name: Make Pyinstaller Executables
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: 3.14
      - uses: abatilo/actions-poetry@v4
        with:
          virtualenvs-in-project: true
      - name: Install dependencies
        run: make install
      - name: Build executable
        run: make package && ls -l dist && ls -l dist/pyinstaller
      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: albums-pyinstaller-linux
          path: dist/pyinstaller/

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: 3.12
      - uses: abatilo/actions-poetry@v4
        with:
          poetry-version: 2.3.2
          poetry-plugins: poetry-dynamic-versioning poetry-pyinstaller-plugin
      - name: Install dependencies
        run: poetry install
        shell: bash
      - name: Build executable
        run: poetry -v build
        shell: bash
      - name: Upload pyinstaller artifact
        uses: actions/upload-artifact@v4
        with:
          name: albums-pyinstaller-win
          path: dist/pyinstaller/win_amd64/albums/
